name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  test-ubuntu:
    name: Test Run Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: |
            tools/android.jar
            tools/d8.jar
            tools/apksigner.jar
          key: h2apk-tools-v1

      - name: Install Android SDK tools
        run: |
          sudo apt update -qq
          sudo apt install -y android-sdk-build-tools

      - name: Run setup.sh
        run: bash setup.sh

      - name: Verify Go build
        run: go build -o /dev/null .

      - name: Smoke test — start server
        run: |
          go run . &
          SERVER_PID=$!
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true
          kill $SERVER_PID 2>/dev/null || true

  test-android-sdk:
    name: Test Run Android SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: |
            tools/android.jar
            tools/d8.jar
            tools/apksigner.jar
          key: h2apk-tools-v1

      - name: Setup Android SDK
        run: |
          sudo apt update -qq
          sudo apt install -y openjdk-17-jdk-headless zip wget android-sdk-build-tools

      - name: Run setup.sh
        run: bash setup.sh

      - name: Verify Go build
        run: go build -o /dev/null .

      - name: Smoke test — start server
        run: |
          go run . &
          SERVER_PID=$!
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true
          kill $SERVER_PID 2>/dev/null || true