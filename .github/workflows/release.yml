name: Publish android.jar release

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download android.jar from Google
        run: |
          mkdir -p platforms/android-34
          cd platforms/android-34
          curl -sL -o platform.zip "https://dl.google.com/android/repository/platform-34-ext7_r03.zip"
          unzip -q platform.zip
          find . -name "android.jar" -exec mv {} android.jar \;
          rm -f platform.zip
          ls -lh android.jar

      - name: Upload to existing release
        run: |
          RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/android-34")
          RELEASE_ID=$(echo "$RELEASE" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          # Delete old assets
          ASSETS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/$RELEASE_ID/assets")
          echo "$ASSETS" | python3 -c "
import json, sys
for a in json.load(sys.stdin):
    print(a['id'])
" | while read id; do
            echo "Deleting old asset $id"
            curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases/assets/$id"
          done
          # Upload new
          curl -s --max-time 120 -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/java-archive" \
            --data-binary @platforms/android-34/android.jar \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=android.jar" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Uploaded: {d[\"name\"]} ({d[\"size\"]} bytes) -> {d[\"browser_download_url\"]}')"
